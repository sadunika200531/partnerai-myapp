name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x "work_7472407353_completed (43)/android/gradlew"

    - name: Build with Gradle
      run: |
        cd "work_7472407353_completed (43)/android"
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: "work_7472407353_completed (43)/android/app/build/outputs/apk/debug/app-debug.apk"
